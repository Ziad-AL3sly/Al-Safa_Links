    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

        body {
            background: linear-gradient(145deg, #f8f9fc, #eef2f6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 60px 60px 40px 40px;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(255, 77, 109, 0.1) inset;
            overflow: hidden;
            position: relative;
        }

        .top-decoration {
            height: 12px;
            background: linear-gradient(90deg, #000000, #000000, #000000);
            width: 100%;
        }

        .content {
            padding: 40px 30px;
            position: relative;
        }


        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-wrapper {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 15px 35px rgba(255, 77, 109, 0.3),
                0 0 0 5px #ffffff,
                0 0 0 7px #ffd9e0;
            transition: 0.3s;
        }

        .logo-wrapper:hover {
            transform: scale(1.03);
            box-shadow:
                0 20px 40px rgba(255, 77, 109, 0.4),
                0 0 0 5px #ffffff,
                0 0 0 9px #ffc9d2;
        }

        .logo-wrapper img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
        }

        .logo-section h1 {
            font-size: 42px;
            font-weight: 900;
            color: #1a1a2c;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 0 rgba(255, 77, 109, 0.1);
        }

        .logo-section .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
            background: #f2f5fa;
            display: inline-block;
            padding: 8px 28px;
            border-radius: 100px;
            border: 1px solid #ffd9e0;
            font-weight: 500;
        }

        .official-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #ff4d6d;
            padding: 8px 28px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid #ffb8c5;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.15);
        }

        .official-badge i {
            font-size: 16px;
            color: #ff4d6d;
        }


        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            padding: 20px 0;
            border-top: 2px dashed #eee;
            border-bottom: 2px dashed #eee;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 900;
            color: #ff4d6d;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0 20px;
        }

        .title-line {
            width: 5px;
            height: 30px;
            background: linear-gradient(135deg, #ff4d6d, #ff8a5c);
            border-radius: 10px;
        }

        .section-title h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2c;
        }

        .section-title span {
            color: #ff4d6d;
            font-size: 14px;
            margin-right: auto;
            opacity: 0.8;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 16px 25px;
            background: #f8f9fc;
            border: 1px solid #edf2f7;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 77, 109, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .link-item:hover {
            border-color: #ff4d6d;
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.15);
        }

        .link-item:hover::before {
            transform: translateX(100%);
        }

        .link-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-left: 15px;
            color: white;
            flex-shrink: 0;
        }

        .fb-icon {
            background: #1877f2;
        }

        .ig-icon {
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf);
        }

        .tt-icon {
            background: #010101;
        }

        .x-icon {
            background: #000000;
        }

        .linkedin-icon {
            background: #0077b5;
        }

        .yt-icon {
            background: #ff0000;
        }

        .wa-icon {
            background: #25D366;
        }

        .tg-icon {
            background: #0088cc;
        }

        .snap-icon {
            background: #fffc00;
            color: #000;
        }

        .web-icon {
            background: #ff4d6d;
        }

        .link-content {
            flex: 1;
        }

        .link-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2c;
            margin-bottom: 4px;
        }

        .link-handle {
            font-size: 13px;
            color: #666;
        }

        .link-arrow {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4d6d;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        .link-item:hover .link-arrow {
            background: #ff4d6d;
            color: white;
            transform: rotate(-45deg);
        }

        .contact-card {
            background: linear-gradient(135deg, #ff4d6d, #ff8a5c);
            border-radius: 40px;
            padding: 30px 25px;
            margin: 30px 0 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .contact-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 2;
        }

        .contact-row:last-child {
            border-bottom: none;
        }

        .contact-row i {
            width: 30px;
            font-size: 20px;
        }

        .contact-row span {
            font-size: 16px;
            font-weight: 500;
        }

        .hours-box {
            background: #f8f9fc;
            border: 1px solid #edf2f7;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
        }

        .hours-box i {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .hours-box .days {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2c;
            margin-bottom: 5px;
        }

        .hours-box .time {
            font-size: 20px;
            font-weight: 900;
            color: #ff4d6d;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
            font-size: 13px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .footer i {
            color: #ff4d6d;
        }
    </style>
</head>
